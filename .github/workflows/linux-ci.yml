name: Linux CI

on:
  push:
    branches: [master]
    paths:
      - 'linux/**'
      - '.github/workflows/linux-ci.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [master]
    paths:
      - 'linux/**'
      - '.github/workflows/linux-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm cmake extra-cmake-modules ninja qt6-base qt6-multimedia
          pacman -Sy --noconfirm kconfig kcoreaddons ki18n kscreen

      - name: Create build directory
        run: mkdir -p linux/build

      - name: Configure
        working-directory: linux/build
        run: |
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: linux/build
        run: |
          ninja

      - name: Check binary exists
        run: test -f linux/build/ilko && echo "Build successful" || exit 1

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm cmake extra-cmake-modules ninja qt6-base qt6-multimedia
          pacman -Sy --noconfirm kconfig kcoreaddons ki18n kscreen

      - name: Build package
        working-directory: linux
        run: |
          rm -rf build
          makepkg -sf

      - name: Get package filename
        id: pkgfile
        working-directory: linux
        run: |
          echo "filename=$(ls ilko-*.pkg.tar.zst)" >> $GITHUB_OUTPUT

      - name: Upload release artifact
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            linux/${{ steps.pkgfile.outputs.filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}