name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS DMG ────────────────────────────────────────────────────────────
  build-macos:
    # macos-26 ships Xcode 26 by default; the project uses macOS 26 SDK APIs
    # (.glass, default-MainActor isolation, deployment target 26.1) that the
    # older macos-15 image (Xcode 16.4) cannot compile.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build DMG
        # On tag pushes VERSION is the tag (e.g. v1.3.1). On workflow_dispatch
        # the ref is a branch whose name may contain "/", which would break the
        # DMG path, so fall back to a safe placeholder for test runs.
        run: make dmg VERSION="${{ github.ref_type == 'tag' && github.ref_name || 'test' }}"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ILKO-*.dmg
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

      - name: Upload DMG artifact (non-tag / test runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ILKO-dmg
          path: dist/ILKO-*.dmg
          if-no-files-found: error

  # ── Windows Installer (Inno Setup) ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate icon.ico from PNG
        shell: pwsh
        run: powershell -File windows/make_icon.ps1

      - name: Publish (self-contained, win-x64)
        shell: pwsh
        run: |
          dotnet publish windows/Ilko.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o windows/dist/publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        env:
          ILKO_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'test' }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc windows/installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows/dist/installer/ILKO-*-windows-x64-setup.exe
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

      - name: Upload installer artifact (non-tag / test runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ILKO-windows-setup
          path: windows/dist/installer/ILKO-*-windows-x64-setup.exe
          if-no-files-found: error

# ── Linux (Arch Linux package) ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm cmake ninja extra-cmake-modules base-devel
          pacman -Sy --noconfirm qt6-base qt6-multimedia qt6-multimedia-ffmpeg qt6-multimedia-gstreamer
          pacman -Sy --noconfirm kconfig kcoreaddons ki18n plasma-workspace kirigami
          pacman -Sy --noconfirm libva mesa ffmpeg

      - name: Build package
        working-directory: linux
        run: |
          VERSION="${{ github.ref_type == 'tag' && github.ref_name || 'test' }}"
          VERSION="${VERSION#v}"    # strip leading 'v'
          VERSION="${VERSION%%-*}"  # strip -alpha / -rc suffix
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          rm -rf build pkg
          # makepkg refuses to run as root and --asroot was removed.
          # Create an unprivileged build user; all deps are already
          # installed by the previous step so -s (sync) is not needed.
          useradd -m builder
          chown -R builder:builder .
          BUILDDIR=$(pwd)
          su builder -c "cd $BUILDDIR && makepkg -f --noconfirm"

      - name: Get package filename
        id: pkgfile
        working-directory: linux
        run: |
          echo "filename=$(ls ilko-*.pkg.tar.zst | head -1)" >> $GITHUB_OUTPUT

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: linux/${{ steps.pkgfile.outputs.filename }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

      - name: Upload package artifact (non-tag / test runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ilko-linux-pkg
          path: linux/${{ steps.pkgfile.outputs.filename }}
          if-no-files-found: error
