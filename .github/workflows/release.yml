name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── macOS DMG ────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build DMG
        run: make dmg VERSION=${{ github.ref_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ILKO-*.dmg
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  # ── Windows Installer (Inno Setup) ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate icon.ico from PNG
        shell: pwsh
        run: powershell -File windows/make_icon.ps1

      - name: Publish (self-contained, win-x64)
        shell: pwsh
        run: |
          dotnet publish windows/Ilko.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o windows/dist/publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        env:
          ILKO_VERSION: ${{ github.ref_name }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc windows/installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: windows/dist/installer/ILKO-*-windows-x64-setup.exe
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  # ── Linux (Arch Linux package) ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm cmake ninja extra-cmake-modules
          pacman -Sy --noconfirm qt6-base qt6-multimedia

      - name: Build
        run: |
          mkdir -p linux/build && cd linux/build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          ninja

      - name: Package
        run: |
          mkdir -p linux/dist
          cd linux/build
          DESTDIR=../dist/pkg ninja install
          cd ../dist
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          cp ../data/ilko.png pkg/usr/share/icons/hicolor/256x256/apps/ilko.png
          mkdir -p pkg/usr/share/applications
          cp ../data/ilko.desktop pkg/usr/share/applications/ilko.desktop

          VERSION=${{ github.ref_name }}
          tar -C pkg -cf ilko-${VERSION}-x86_64.pkg.tar .
          zstd ilko-${VERSION}-x86_64.pkg.tar -o ilko-${VERSION}-x86_64.pkg.tar.zst

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: linux/dist/ilko-*.pkg.tar.zst
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
