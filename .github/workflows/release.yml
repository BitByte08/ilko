name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── macOS DMG ────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build DMG
        run: make dmg VERSION=${{ github.ref_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ILKO-*.dmg
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  # ── Windows EXE (self-contained) ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate icon.ico from PNG
        shell: pwsh
        run: powershell -File windows/make_icon.ps1

      - name: Publish (self-contained, win-x64)
        shell: pwsh
        run: |
          dotnet publish windows/Ilko.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o dist/windows

      - name: Rename exe
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          Rename-Item dist/windows/Ilko.exe "ILKO-$ver-windows-x64.exe"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/ILKO-*-windows-x64.exe
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
