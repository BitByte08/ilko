name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── macOS DMG ────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build DMG
        run: make dmg VERSION=${{ github.ref_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ILKO-*.dmg
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  # ── Windows Installer (Inno Setup) ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate icon.ico from PNG
        shell: pwsh
        run: powershell -File windows/make_icon.ps1

      - name: Publish (self-contained, win-x64)
        shell: pwsh
        run: |
          dotnet publish windows/Ilko.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o windows/dist/publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        env:
          ILKO_VERSION: ${{ github.ref_name }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc windows/installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: windows/dist/installer/ILKO-*-windows-x64-setup.exe
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

# ── Linux (Arch Linux package) ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm cmake ninja extra-cmake-modules base-devel
          pacman -Sy --noconfirm qt6-base qt6-multimedia qt6-multimedia-ffmpeg
          pacman -Sy --noconfirm kconfig kcoreaddons ki18n plasma-workspace kirigami
          pacman -Sy --noconfirm libva mesa ffmpeg

      - name: Build package
        working-directory: linux
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          rm -rf build pkg
          makepkg -sf

      - name: Get package filename
        id: pkgfile
        working-directory: linux
        run: |
          echo "filename=$(ls ilko-*.pkg.tar.zst)" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with: |
          files: linux/${{ steps.pkgfile.outputs.filename }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
